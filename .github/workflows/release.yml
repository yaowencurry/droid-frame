name: Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew test :app:assembleRelease

      - name: Verify release APK
        run: test -f app/build/outputs/apk/release/app-release.apk

      - name: Prepare release asset
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/DroidFrame-${TAG_NAME}.apk"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            "dist/DroidFrame-${TAG_NAME}.apk" \
            --title "DroidFrame ${TAG_NAME}" \
            --generate-notes \
            --verify-tag
