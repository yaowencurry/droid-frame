<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2400" viewBox="0 0 1800 2400">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf3"/>
      <stop offset="1" stop-color="#edf2e7"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfbf5"/>
      <stop offset="1" stop-color="#eef7ee"/>
    </linearGradient>
    <linearGradient id="oppoMetal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#66766e"/>
      <stop offset="0.07" stop-color="#ffffff"/>
      <stop offset="0.20" stop-color="#b8c8bd"/>
      <stop offset="0.50" stop-color="#7c9086"/>
      <stop offset="0.82" stop-color="#f5fff3"/>
      <stop offset="1" stop-color="#5e6f67"/>
    </linearGradient>
    <linearGradient id="xiaomiMetal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6d7575"/>
      <stop offset="0.10" stop-color="#ffffff"/>
      <stop offset="0.48" stop-color="#abb2af"/>
      <stop offset="0.90" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#68706f"/>
    </linearGradient>
    <linearGradient id="blackTitanium" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#060708"/>
      <stop offset="0.13" stop-color="#6c7372"/>
      <stop offset="0.48" stop-color="#161a1a"/>
      <stop offset="0.86" stop-color="#828988"/>
      <stop offset="1" stop-color="#060708"/>
