    <linearGradient id="glassMetal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9ca6a0"/>
      <stop offset="0.16" stop-color="#ffffff"/>
      <stop offset="0.52" stop-color="#dfe7de"/>
      <stop offset="0.82" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#89958e"/>
    </linearGradient>
    <filter id="phoneShadow" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#17221a" flood-opacity="0.20"/>
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#17221a" flood-opacity="0.12"/>
    </filter>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#293228" flood-opacity="0.08"/>
    </filter>
    <style>
      .title{font:800 54px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#16231c}
      .sub{font:400 27px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#667269}
      .tag{font:800 32px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#17231d}
      .name{font:700 25px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#344039}
      .screenTiny{font:500 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#6f7a72}
      .screenTitle{font:800 26px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#17231d}
